server.port=8080
spring.application.name=climalert-service
spring.threads.virtual.enabled=true

# Base de datos para historico climatico
spring.datasource.url=jdbc:h2:file:${CLIMALERT_DATA_DIR:./data}/climalert;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# WeatherAPI
climalert.weather-api.base-url=https://api.weatherapi.com/v1
climalert.weather-api.key=${WEATHERAPI_KEY:}
climalert.location=Dubai,United Arab Emirates

# Umbrales de alerta
climalert.alert.temperature-threshold-c=35
climalert.alert.humidity-threshold=60
climalert.alert.recipients=admin@clima.com,emergencias@clima.com,meteorologia@clima.com,jeronimoalo2015@gmail.com

# Email SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME:}
spring.mail.password=${BREVO_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
climalert.alert.sender=${BREVO_SMTP_SENDER:no-reply@climalert.com}